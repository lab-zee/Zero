services:
  postgres:
    image: postgres:16-alpine
    container_name: labz-postgres
    environment:
      POSTGRES_USER: labz_user
      POSTGRES_PASSWORD: labz_password
      POSTGRES_DB: labz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labz_user -d labz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labz-backend
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://labz_user:labz_password@postgres:5432/labz_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: labz_user
      POSTGRES_PASSWORD: labz_password
      POSTGRES_DB: labz_db
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      RELOAD: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head || true && uvicorn src.main:app --host 0.0.0.0 --port 3001 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: labz-frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  frontend_node_modules:
